<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIXEL90 — Sistema de Gestión</title>
<style>
/* ── RESET & VARS ─────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --cyan:    #00E5FF; --magenta: #FF00C8; --lime:    #AAFF00; --orange:  #FF6B00;
  --bg:      #0A0A0F; --bg2:     #111118; --bg3:     #1A1A24; --bg4:     #22222E;
  --border:  #2A2A3A; --text:    #E8E8F0; --muted:   #888899;
  --danger:  #FF4455; --success: #00FF88; --warn:    #FFB700;
  --font:    'Segoe UI', system-ui, sans-serif; --radius:  10px;
}
body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; overflow-x: hidden; }
a { color: var(--cyan); text-decoration: none; }
input, select, textarea {
  background: var(--bg3); border: 1px solid var(--border); color: var(--text);
  border-radius: 6px; padding: 8px 12px; font-size: 14px; font-family: var(--font);
  outline: none; width: 100%; transition: border-color .2s;
}
input:focus, select:focus, textarea:focus { border-color: var(--cyan); }
button { cursor: pointer; border: none; border-radius: 6px; padding: 8px 16px;
  font-size: 13px; font-weight: 600; font-family: var(--font); transition: all .15s; }
.btn-primary { background: var(--cyan); color: #000; }
.btn-primary:hover { background: #00c8e0; }
.btn-secondary { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { border-color: var(--cyan); color: var(--cyan); }
.btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
.btn-danger:hover { background: var(--danger); color: #fff; }
.btn-sm { padding: 5px 10px; font-size: 12px; }
table { width: 100%; border-collapse: collapse; }
th { background: var(--bg3); color: var(--muted); font-size: 11px; font-weight: 600;
     text-transform: uppercase; letter-spacing: .06em; padding: 10px 14px; text-align: left;
     cursor: pointer; user-select: none; position: relative; resize: horizontal; overflow: hidden; min-width: 60px; }
th:hover { color: var(--cyan); }
th .sort-arrow { font-size: 10px; margin-left: 4px; opacity: 0.5; }
th.sorted-asc .sort-arrow, th.sorted-desc .sort-arrow { opacity: 1; color: var(--cyan); }
td { padding: 11px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(0,229,255,.03); }
.badge { display: inline-block; padding: 2px 9px; border-radius: 20px; font-size: 11px; font-weight: 700; }
.badge-ok { background: rgba(0,255,136,.15); color: var(--success); }
.badge-warn { background: rgba(255,183,0,.15); color: var(--warn); }
.badge-danger { background: rgba(255,68,85,.15); color: var(--danger); }
.badge-cyan { background: rgba(0,229,255,.15); color: var(--cyan); }
.badge-magenta { background: rgba(255,0,200,.15); color: var(--magenta); }
.badge-lime { background: rgba(170,255,0,.15); color: var(--lime); }
.badge-orange { background: rgba(255,107,0,.15); color: var(--orange); }
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
.section-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.form-grid { display: grid; gap: 12px; }
.form-grid.cols2 { grid-template-columns: 1fr 1fr; }
.form-grid.cols3 { grid-template-columns: 1fr 1fr 1fr; }
.form-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .05em; }
.form-group { display: flex; flex-direction: column; }
.divider { height: 1px; background: var(--border); margin: 16px 0; }
.empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
.empty-state img { width: 120px; margin-bottom: 16px; opacity: .7; border-radius: 12px; }
.empty-state p { font-size: 15px; margin-bottom: 8px; }
.empty-state small { font-size: 12px; }
#app { display: flex; height: 100vh; }
#sidebar { width: 220px; min-width: 220px; background: var(--bg2); border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow-y: auto; }
.sidebar-logo { padding: 20px 16px 12px; border-bottom: 1px solid var(--border); position: relative; }
.glitch-logo { position: relative; display: inline-block; width: 100%; max-width: 160px; }
.glitch-logo img { width: 100%; display: block; position: relative; z-index: 1; }
.glitch-logo::before, .glitch-logo::after {
  content: ''; position: absolute; inset: 0;
  background-image: url('/static/img/logo.png'); background-size: 100% 100%;
  width: 100%; height: 100%; opacity: 0.75;
}
.glitch-logo::before { animation: glitch-before 3.5s infinite steps(1); mix-blend-mode: screen; filter: hue-rotate(180deg) saturate(3); }
.glitch-logo::after { animation: glitch-after 3.5s infinite steps(1); mix-blend-mode: screen; filter: hue-rotate(300deg) saturate(3); }
@keyframes glitch-before {
  0%,89% { clip-path: inset(100% 0 0 0); transform: translate(0,0); }
  90% { clip-path: inset(15% 0 70% 0); transform: translate(-3px, 1px); }
  91% { clip-path: inset(55% 0 20% 0); transform: translate(3px,-1px); }
  92% { clip-path: inset(30% 0 50% 0); transform: translate(-2px, 2px); }
  93% { clip-path: inset(70% 0 5% 0); transform: translate(2px,-2px); }
  94%,100% { clip-path: inset(100% 0 0 0); transform: translate(0,0); }
}
@keyframes glitch-after {
  0%,89% { clip-path: inset(100% 0 0 0); transform: translate(0,0); }
  90% { clip-path: inset(40% 0 40% 0); transform: translate(3px,-1px); }
  91% { clip-path: inset(10% 0 75% 0); transform: translate(-3px, 1px); }
  92% { clip-path: inset(60% 0 15% 0); transform: translate(2px, 2px); }
  93% { clip-path: inset(80% 0 2% 0); transform: translate(-2px,-2px); }
  94%,100% { clip-path: inset(100% 0 0 0); transform: translate(0,0); }
}
.nav-section { padding: 12px 10px 4px; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .1em; }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 14px; border-radius: 8px; margin: 1px 8px;
  cursor: pointer; transition: all .15s; color: var(--muted); font-size: 13px; position: relative; }
.nav-item:hover { background: var(--bg3); color: var(--text); }
.nav-item.active { background: rgba(0,229,255,.1); color: var(--cyan); font-weight: 600; }
.nav-item .icon { font-size: 16px; width: 20px; text-align: center; }
.nav-badge { position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
  background: var(--danger); color: #fff; font-size: 10px; font-weight: 800;
  min-width: 18px; height: 18px; border-radius: 9px; display: flex; align-items: center; justify-content: center; padding: 0 4px; }
.sidebar-mascot { padding: 16px; margin-top: auto; }
.sidebar-mascot img { width: 100%; border-radius: 12px; opacity: .85; }
#main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
.topbar { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 14px 24px;
  display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
.topbar-title { font-size: 16px; font-weight: 700; }
.topbar-sub { font-size: 12px; color: var(--muted); }
#content { padding: 24px; flex: 1; }
.tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 0; }
.tab-btn { background: none; color: var(--muted); border: none; border-bottom: 2px solid transparent;
  border-radius: 0; padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer;
  margin-bottom: -1px; transition: all .15s; }
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--cyan); border-bottom-color: var(--cyan); }
.tab-content { display: none; }
.tab-content.active { display: block; }
.kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
.kpi-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 18px 20px; position: relative; overflow: hidden; }
.kpi-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; }
.kpi-card.cyan::before { background: var(--cyan); }
.kpi-card.magenta::before { background: var(--magenta); }
.kpi-card.lime::before { background: var(--lime); }
.kpi-card.orange::before { background: var(--orange); }
.kpi-label { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 8px; }
.kpi-value { font-size: 22px; font-weight: 800; }
.kpi-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }
.chart-row { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; margin-bottom: 24px; }
.chart-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
.chart-title { font-size: 13px; font-weight: 700; margin-bottom: 16px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
.bar-chart { display: flex; align-items: flex-end; gap: 6px; height: 160px; padding-top: 28px; position: relative; }
.bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; position: relative; }
.bar-wrap { display: flex; gap: 3px; align-items: flex-end; width: 100%; height: 130px; }
.bar { flex: 1; border-radius: 3px 3px 0 0; min-height: 3px; transition: height .4s ease, opacity .15s; cursor: pointer; position: relative; }
.bar:hover { opacity: .75; }
.bar-label { font-size: 10px; color: var(--muted); text-align: center; margin-top: 6px; }
.bar-top-label { position: absolute; top: -20px; left: 50%; transform: translateX(-50%);
  font-size: 9px; font-weight: 700; white-space: nowrap; opacity: 0; transition: opacity .15s; pointer-events: none; }
.bar-col:hover .bar-top-label { opacity: 1; }
.chart-tooltip { position: absolute; background: var(--bg3); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 14px; font-size: 12px; pointer-events: none;
  z-index: 20; min-width: 160px; opacity: 0; transition: opacity .15s; box-shadow: 0 4px 20px rgba(0,0,0,.4); }
.chart-tooltip.visible { opacity: 1; }
.chart-tooltip .tt-mes { font-weight: 700; margin-bottom: 6px; font-size: 13px; }
.chart-tooltip .tt-row { display: flex; justify-content: space-between; gap: 16px; padding: 2px 0; }
.chart-tooltip .tt-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
.chart-tooltip .tt-gan { border-top: 1px solid var(--border); margin-top: 5px; padding-top: 5px; font-weight: 700; }
.donut-wrap { display: flex; flex-direction: column; gap: 8px; }
.donut-item { display: flex; align-items: center; gap: 10px; }
.donut-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.donut-label { flex: 1; font-size: 12px; }
.donut-val { font-size: 12px; font-weight: 700; }
.alert-item { display: flex; align-items: center; gap: 12px; padding: 10px 14px;
  background: rgba(255,68,85,.06); border: 1px solid rgba(255,68,85,.2); border-radius: 8px; margin-bottom: 8px; }
.alert-icon { font-size: 18px; }
.alert-name { flex: 1; font-size: 13px; font-weight: 600; }
.alert-stock { font-size: 12px; color: var(--danger); }
.modal-bg { position: fixed; inset: 0; background: rgba(0,0,0,.7);
  display: flex; align-items: center; justify-content: center;
  z-index: 100; opacity: 0; pointer-events: none; transition: opacity .2s; }
.modal-bg.open { opacity: 1; pointer-events: all; }
.modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 14px; padding: 28px;
  width: 90%; max-width: 620px; max-height: 90vh; overflow-y: auto;
  transform: translateY(20px); transition: transform .2s; }
.modal-bg.open .modal { transform: translateY(0); }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.modal-title { font-size: 17px; font-weight: 800; }
.modal-close { background: var(--bg3); border: none; color: var(--muted); width: 30px; height: 30px;
  border-radius: 50%; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.modal-close:hover { background: var(--danger); color: #fff; }
.modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
.toolbar { display: flex; gap: 10px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
.toolbar-search { flex: 1; min-width: 160px; max-width: 280px; }
.toolbar input { background: var(--bg3); }
.estado-Pendiente { color: var(--warn); }
.estado-En.Producción { color: var(--cyan); }
.estado-Listo { color: var(--lime); }
.estado-Entregado { color: var(--success); }
.estado-Cancelado { color: var(--danger); }
.estado-Reingreso { color: var(--orange); }
.cost-row { display: flex; justify-content: space-between; padding: 8px 0;
  border-bottom: 1px solid var(--border); font-size: 13px; }
.cost-row.total { font-weight: 800; font-size: 15px; border-bottom: none; color: var(--cyan); padding-top: 12px; }
.cost-row.precio-min { font-weight: 800; font-size: 15px; border-bottom: none; color: var(--lime); }
.cost-row.precio-sug { font-weight: 800; font-size: 16px; border-bottom: none; color: var(--magenta); }
.cost-label { color: var(--muted); }
#toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 999; display: flex; flex-direction: column; gap: 8px; }
.toast { background: var(--bg3); border: 1px solid var(--border); padding: 12px 18px; border-radius: 8px;
  font-size: 13px; animation: slideIn .2s ease; min-width: 220px; }
.toast.success { border-color: var(--success); color: var(--success); }
.toast.error { border-color: var(--danger); color: var(--danger); }
@keyframes slideIn { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
@keyframes glitch { 0%,90%,100% { text-shadow: none; } 92% { text-shadow: 2px 0 var(--cyan), -2px 0 var(--magenta); } 95% { text-shadow: -2px 0 var(--cyan), 2px 0 var(--magenta); } }
.glitch-text { animation: glitch 4s infinite; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--muted); }
/* Autocomplete dropdown */
.autocomplete-list { position: absolute; top: 100%; left: 0; right: 0; background: var(--bg3); border: 1px solid var(--border);
  border-radius: 0 0 6px 6px; max-height: 180px; overflow-y: auto; z-index: 50; }
.autocomplete-item { padding: 8px 12px; cursor: pointer; font-size: 13px; border-bottom: 1px solid var(--border); }
.autocomplete-item:hover { background: rgba(0,229,255,.1); color: var(--cyan); }
/* Cuota +/- buttons */
.cuota-btn { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 16px; font-weight: 800; padding: 0; }
@media (max-width: 768px) {
  #sidebar { width: 60px; min-width: 60px; }
  .nav-item span:not(.icon) { display: none; }
  .nav-section { display: none; }
  .sidebar-logo img { display: none; }
  .kpi-grid { grid-template-columns: 1fr 1fr; }
  .chart-row { grid-template-columns: 1fr; }
  .form-grid.cols2, .form-grid.cols3 { grid-template-columns: 1fr; }
}
</style>
</head>

<script>
// ── UTILS ─────────────────────────────────────────────────────────
const fmt = n => new Intl.NumberFormat('es-PY').format(Math.round(n || 0)) + ' ₲';
const fmtN = n => new Intl.NumberFormat('es-PY').format(+(n || 0).toFixed(2));
const today = () => new Date().toISOString().split('T')[0];
const v = id => document.getElementById(id)?.value || '';

function toast(msg, type='success') {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div'); t.className = `toast ${type}`; t.textContent = msg;
  c.appendChild(t); setTimeout(() => t.remove(), 3000);
}

async function api(url, method='GET', body=null) {
  const opts = { method, headers: {'Content-Type':'application/json'} };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(url, opts);
  if (!r.ok) {
    let msg = 'Error en la petición';
    try {
      const err = await r.json();
      if (err.error) msg = err.error;
    } catch(e) {}
    toast(msg, 'error');
    throw new Error(msg);
  }
  return r.json();
}

function openModal(title, bodyHTML, footerHTML='') {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = bodyHTML;
  document.getElementById('modal-footer').innerHTML = footerHTML;
  document.getElementById('modal-bg').classList.add('open');
}
function closeModal(e) {
  if (!e || e.target === document.getElementById('modal-bg'))
    document.getElementById('modal-bg').classList.remove('open');
}

// ── THOUSAND SEPARATOR FOR NUMBER INPUTS (I) ──────────────────────
function setupThousandSep(input) {
  if (!input || input.dataset.tsBound) return;
  input.dataset.tsBound = '1';
  input.type = 'text';
  input.addEventListener('input', function() {
    let raw = this.value.replace(/\D/g, '');
    if (raw === '') { this.value = ''; return; }
    this.value = parseInt(raw).toLocaleString('es-PY');
  });
}
function numVal(id) {
  const el = document.getElementById(id);
  if (!el) return 0;
  return parseFloat(el.value.replace(/\./g, '').replace(/,/g, '')) || 0;
}
// Auto-apply to all number-like inputs after modal opens
const origOpen = openModal;
openModal = function(title, body, footer) {
  origOpen(title, body, footer);
  setTimeout(() => {
    document.querySelectorAll('#modal input[type="number"]').forEach(inp => {
      if (!inp.classList.contains('no-sep')) setupThousandSep(inp);
    });
  }, 50);
};

const CAT_COLORS = { 'Sublimación':'cyan','DTF':'magenta','Stickers':'lime','Cuadros':'orange','General':'muted' };
const TIPO_BADGE = { 'VENTA':'badge-cyan','PRUEBA':'badge-lime','MERMA':'badge-danger','CALIBRACIÓN':'badge-magenta','MUESTRA':'badge-orange','OTRO':'badge-warn' };
const ESTADO_BADGE = { 'Pendiente':'badge-warn','En Producción':'badge-cyan','Listo':'badge-lime','Entregado':'badge-ok','Entregado (R)':'badge-orange','Cancelado':'badge-danger','Reingreso':'badge-orange' };

// ── NAVIGATION ─────────────────────────────────────────────────────
const PAGES = {
  dashboard:  { title: 'Dashboard', sub: 'Resumen del negocio' },
  insumos:    { title: 'Insumos', sub: 'Stock en unidades de consumo' },
  consumos:   { title: 'Consumos', sub: 'Ventas · Pruebas · Mermas · Calibraciones' },

  clientes:   { title: 'Clientes', sub: 'Base de datos de clientes' },
  pedidos:    { title: 'Pedidos', sub: 'Historial de pedidos' },
  gastos:     { title: 'Gastos', sub: 'Egresos por categoría' },
  marketing:  { title: 'Marketing', sub: 'Campañas y ROI' },
  stock:      { title: 'Stock de Reingreso', sub: 'Productos devueltos' },
  inventario: { title: 'Inventario', sub: 'Amortización de maquinaria' },
  parametros: { title: 'Parámetros', sub: 'Configuración del negocio' },
};

let currentPage = '';
function navigate(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.querySelector(`[onclick="navigate('${page}')"]`)?.classList.add('active');
  const p = PAGES[page] || {};
  document.getElementById('page-title').textContent = p.title || page;
  document.getElementById('page-sub').textContent = p.sub || '';
  const renderers = {
    dashboard: renderDashboard, insumos: renderInsumos,
    consumos: renderConsumos, productos: renderProductos,
    clientes: renderClientes, pedidos: renderPedidos,
    gastos: renderGastos, marketing: renderMarketing,
    stock: renderStock, inventario: renderInventario,
    parametros: renderParametros,
  };
  (renderers[page] || (() => {}))();
  updateAlertBadge();
}

async function updateAlertBadge() {
  try {

    if (badge) {
      if (r.count > 0) { badge.textContent = r.count; badge.style.display = 'flex'; }
      else { badge.style.display = 'none'; }

      if (r.stock_count > 0) { stockBadge.textContent = r.stock_count; stockBadge.style.display = 'flex'; }

async function renderDashboard() {
  const d = await api('/api/dashboard');
  const MONTHS = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const MONTHS_FULL = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const [yr, mo] = (d.mes_referencia || '').split('-');
  const mesLabel = yr ? `${MONTHS_FULL[parseInt(mo)-1]} ${yr}` : 'Mes actual';
  const maxV = Math.max(...d.historico.map(m => Math.max(m.ventas, m.gastos)), 1);
  const bars = d.historico.map((m, idx) => {
    const hv = Math.max(Math.round((m.ventas / maxV) * 130), m.ventas > 0 ? 3 : 0);
    const hg = Math.max(Math.round((m.gastos / maxV) * 130), m.gastos > 0 ? 3 : 0);
    const label = MONTHS[parseInt(m.mes.split('-')[1]) - 1];
    return `<div class="bar-col" id="bar-col-${idx}" onmouseenter="showTooltip(${idx})" onmouseleave="hideTooltip()">
      <div class="bar-top-label" style="color:var(--cyan)">${m.ventas > 0 ? fmt(m.ventas) : ''}</div>
      <div class="bar-wrap">
        <div class="bar" style="background:var(--cyan);height:${hv}px"></div>
        <div class="bar" style="background:var(--magenta);height:${hg}px"></div>
      </div><div class="bar-label">${label}</div></div>`;
  }).join('');
  const alertHTML = d.alertas.length
    ? d.alertas.map(a => `<div class="alert-item"><span class="alert-icon">⚠️</span>
        <span class="alert-name">${a.nombre}</span>
        <span class="alert-stock">Stock: ${fmtN(a.stock)} / Mín: ${fmtN(a.minimo)}</span>
        <button class="btn-danger btn-sm" onclick="navigate('insumos')">Ver</button></div>`).join('')
    : `<div class="empty-state" style="padding:20px"><p>✅ Todos los insumos tienen stock suficiente</p></div>`;
  const catColors = ['var(--cyan)','var(--magenta)','var(--lime)','var(--orange)'];
  const catHTML = d.por_categoria.map((c,i) => `<div class="donut-item">
    <div class="donut-dot" style="background:${catColors[i%4]}"></div>
    <span class="donut-label">${c.categoria}</span><span class="donut-val">${fmt(c.total)}</span></div>`).join('') || `<div style="color:var(--muted);font-size:13px">Sin ventas este mes</div>`;
  document.getElementById('content').innerHTML = `
    <div class="kpi-grid">
      <div class="kpi-card cyan"><div class="kpi-label">Ventas — ${mesLabel}</div><div class="kpi-value">${fmt(d.ventas_mes)}</div><div class="kpi-sub">${d.pedidos_mes} pedidos</div></div>
      <div class="kpi-card magenta"><div class="kpi-label">Gastos — ${mesLabel}</div><div class="kpi-value">${fmt(d.gastos_mes)}</div></div>
      <div class="kpi-card lime"><div class="kpi-label">Ganancia — ${mesLabel}</div><div class="kpi-value" style="color:${d.ganancia>=0?'var(--success)':'var(--danger)'}">${fmt(d.ganancia)}</div><div class="kpi-sub">Margen ${d.margen}%</div></div>
      <div class="kpi-card orange"><div class="kpi-label">Pedidos pendientes</div><div class="kpi-value">${d.pendientes}</div><div class="kpi-sub">en producción</div></div>
    </div>
    <div class="chart-row">
      <div class="chart-wrap" style="position:relative"><div class="chart-title">Ventas vs Gastos — últimos 6 meses</div>
        <div class="bar-chart" id="bar-chart-main">${bars}</div>
        <div style="display:flex;gap:16px;margin-top:8px;font-size:11px;color:var(--muted)">
          <span><span style="color:var(--cyan)">■</span> Ventas</span><span><span style="color:var(--magenta)">■</span> Gastos</span></div>
        <div class="chart-tooltip" id="chart-tooltip"></div></div>
      <div class="chart-wrap"><div class="chart-title">Ventas por categoría</div><div class="donut-wrap">${catHTML}</div></div>
    </div>
    <div class="card"><div class="section-title">⚠️ Alertas de stock</div>${alertHTML}</div>`;
  window._historico = d.historico;
}

const MONTHS_FULL_G = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
function showTooltip(idx) {
  const tt = document.getElementById('chart-tooltip'); const col = document.getElementById(`bar-col-${idx}`);
  if (!tt || !col || !window._historico) return;
  const m = window._historico[idx]; if (!m) return;
  const mes = m.mes.split('-'); const mesNombre = MONTHS_FULL_G[parseInt(mes[1]) - 1] + ' ' + mes[0];
  const gan = m.ventas - m.gastos; const ganColor = gan >= 0 ? 'var(--success)' : 'var(--danger)';
  const margen = m.ventas > 0 ? ((gan / m.ventas) * 100).toFixed(1) : '0.0';
  tt.innerHTML = `<div class="tt-mes">${mesNombre}</div>
    <div class="tt-row"><span><span class="tt-dot" style="background:var(--cyan)"></span>Ventas</span><strong style="color:var(--cyan)">${fmt(m.ventas)}</strong></div>
    <div class="tt-row"><span><span class="tt-dot" style="background:var(--magenta)"></span>Gastos</span><strong style="color:var(--magenta)">${fmt(m.gastos)}</strong></div>
    <div class="tt-row tt-gan"><span>Ganancia</span><strong style="color:${ganColor}">${fmt(gan)}</strong></div>
    <div class="tt-row" style="font-size:11px;color:var(--muted)"><span>Margen</span><span>${margen}%</span></div>`;
  const chartRect = document.getElementById('bar-chart-main').getBoundingClientRect();
  const colRect = col.getBoundingClientRect(); const ttW = 170;
  let left = colRect.left - chartRect.left + col.offsetWidth / 2 - ttW / 2;
  left = Math.max(0, Math.min(left, chartRect.width - ttW));
  tt.style.left = left + 'px'; tt.style.bottom = (col.offsetHeight + 12) + 'px'; tt.classList.add('visible');
}
function hideTooltip() { document.getElementById('chart-tooltip')?.classList.remove('visible'); }

async function buscarCliente(q) {
  const list = document.getElementById('pd-cliente-list');
  if (q.length < 2) { list.style.display = 'none'; return; }
  const clientes = await api(`/api/clientes/buscar?q=${encodeURIComponent(q)}`);
  let html = clientes.map(c => `<div class="autocomplete-item" onclick="selectCliente(${c.id},'${(c.nombre+' '+(c.apellido||'')).replace(/'/g,"\\'")}','${(c.telefono||'').replace(/'/g,"\\'")}')">
    <strong>${c.nombre} ${c.apellido||''}</strong> <span style="color:var(--muted);font-size:11px">${c.tipo_documento}: ${c.numero_documento||''}</span></div>`).join('');
  if (clientes.length === 0) {
    html = `<div class="autocomplete-item" style="color:var(--cyan)" onclick="crearClienteDesdeOrden()">+ Agregar nuevo cliente</div>`;
  }
  list.innerHTML = html;
  list.style.display = 'block';
}
function selectCliente(id, nombre, tel) {
  document.getElementById('pd-cliente').value = nombre; document.getElementById('pd-cliente').dataset.clienteId = id;
  document.getElementById('pd-tel').value = tel;
  document.getElementById('pd-cliente-list').style.display = 'none';

function crearClienteDesdeOrden() {

  window._pedidoFormState = {

    entrega: v('pd-entrega'), cuotas: v('pd-cuotas'), modelo: v('pd-modelo'),

async function saveClienteYVolver() {
  const d = getClienteData();
  if (!d.nombre) { toast('El nombre es obligatorio','error'); return; }
  const r = await api('/api/clientes', 'POST', d);
  toast('Cliente guardado ✓'); closeModal();
  // Re-open pedido form and restore state
  await modalNuevoPedido();
  const st = window._pedidoFormState || {};
  if (st.fecha) document.getElementById('pd-fecha').value = st.fecha;
  if (st.canal) document.getElementById('pd-canal').value = st.canal;
  if (st.entrega) document.getElementById('pd-entrega').value = st.entrega;
  if (st.cuotas) document.getElementById('pd-cuotas').value = st.cuotas;
  if (st.modelo) document.getElementById('pd-modelo').value = st.modelo;
  if (st.notas) document.getElementById('pd-notas').value = st.notas;
  // Set the new client
  const inp = document.getElementById('pd-cliente');
  if (inp) { inp.value = `${d.nombre} ${d.apellido||''}`.trim(); inp.dataset.clienteId = r.id; }
  if (d.telefono) document.getElementById('pd-tel').value = d.telefono;
}

let itemCount = 0;
function addItem() {
  itemCount++;
  const prods = JSON.parse(document.getElementById('pd-prods-json')?.textContent || '[]');
  const opts = prods.map(p => `<option value="${p.id}" data-precio="${p.precio_sugerido||0}">${p.nombre}</option>`).join('');
  const c = document.getElementById('items-container');
  const div = document.createElement('div'); div.id = `item-${itemCount}`;
  div.style.cssText = 'display:grid;grid-template-columns:2fr 60px 1fr 30px;gap:8px;margin-bottom:8px;align-items:center';
  div.innerHTML = `<select class="item-prod" onchange="autocompletarPrecio(this)"><option value="" data-precio="0">— Producto —</option>${opts}</select>
    <input type="number" class="item-cant no-sep" value="1" min="1" oninput="calcTotal()">
    <input type="number" class="item-precio" placeholder="Precio unit. ₲" oninput="calcTotal()">
    <button class="btn-danger btn-sm" onclick="this.parentElement.remove();calcTotal()">✕</button>`;
  c.appendChild(div);
}
function autocompletarPrecio(sel) {
  const precio = sel.options[sel.selectedIndex]?.dataset?.precio || 0;
  const row = sel.closest('div[id^="item-"]');
  const pi = row.querySelector('.item-precio');
  if (pi && precio > 0) { pi.value = precio; pi.style.borderColor = 'var(--lime)'; setTimeout(() => pi.style.borderColor = '', 2000); }
  calcTotal();
}
function calcTotal() {
  let total = 0;
  document.querySelectorAll('#items-container > div[id^="item-"]').forEach(row => {
    const cant = parseFloat(row.querySelector('.item-cant')?.value || 0);
    const precioRaw = row.querySelector('.item-precio')?.value || '0';
    const precio = parseFloat(precioRaw.replace(/\./g, '').replace(/,/g, '')) || parseFloat(precioRaw) || 0;
    total += cant * precio;
  });
  const input = document.getElementById('pd-total');
  if (input) { input.value = Math.round(total); calcSaldo(); }
}
function calcSaldo() {
  const t = numVal('pd-total'), a = numVal('pd-adelanto');
  const s = document.getElementById('saldo-preview');
  if (s) s.textContent = `Saldo pendiente: ${fmt(t-a)}`;
}
async function savePedido() {
  const items = [...document.querySelectorAll('#items-container > div')].map(div => ({
    producto_id: div.querySelector('.item-prod')?.value || null,
    descripcion: div.querySelector('.item-prod')?.options[div.querySelector('.item-prod').selectedIndex]?.text || '',
    cantidad: parseFloat(div.querySelector('.item-cant')?.value||1),
    precio_unit: parseFloat((div.querySelector('.item-precio')?.value||'0').replace(/\./g,'').replace(/,/g,'')) || parseFloat(div.querySelector('.item-precio')?.value||0),
  })).filter(i => i.precio_unit > 0);
  const r = await api('/api/pedidos', 'POST', {
    fecha: v('pd-fecha'), canal: v('pd-canal'),
    cliente_id: document.getElementById('pd-cliente')?.dataset?.clienteId || null,
    cliente: v('pd-cliente'), telefono: v('pd-tel'),
    fecha_entrega: v('pd-entrega'), estado: 'Pendiente',
    total: numVal('pd-total'), adelanto: numVal('pd-adelanto'),
    cuotas: parseInt(v('pd-cuotas')) || 1,
    modelo_seguir: v('pd-modelo'), notas: v('pd-notas'), items,
  });
  toast(`Pedido ${r.numero} creado ✓`); closeModal(); renderPedidos();
}

    const pedidos = await api('/api/pedidos');

    const itemOpts = (p?.items || []).map(i =>

async function saveEstado(id) {
  const pedidos = await api('/api/pedidos'); const p = pedidos.find(x => x.id === id);
  if (!p) return;
  const nuevoEstado = v('est-nuevo');
  const updateData = {...p, estado: nuevoEstado};
  // Factura
  if (nuevoEstado === 'Listo' && document.getElementById('fac-check')?.checked) {
    updateData.solicita_factura = 1;
    updateData.factura_razon = v('fac-razon'); updateData.factura_ruc = v('fac-ruc');
    updateData.factura_email = v('fac-email'); updateData.factura_tel = v('fac-tel');
    updateData.factura_dir = v('fac-dir');
  }
  await api(`/api/pedidos/${id}`, 'PUT', updateData);
  // Reingreso
  if (nuevoEstado === 'Reingreso') {
    const reSel = document.getElementById('re-prod');
    const reDesc = reSel?.options[reSel.selectedIndex]?.dataset?.desc || '';
    await api(`/api/pedidos/${id}/reingreso`, 'POST', {
      producto_id: v('re-prod'), descripcion: reDesc,
      cantidad: v('re-cant'), valor_unit: numVal('re-valor'), motivo: v('re-motivo')
    });
  }
  // Auto-register consumos on Entregado
  if (nuevoEstado === 'Entregado') {
    const check = await api(`/api/pedidos/${id}/consumos_registrados`);
    if (!check.registrados && p.items?.length > 0) {
      const todosProductos = await api('/api/productos');
      for (const item of p.items) {
        if (!item.producto_id) continue;
        const prod = todosProductos.find(x => x.id === item.producto_id);
        if (!prod) continue;
        for (const r of prod.receta) {
          await api('/api/consumos', 'POST', { fecha: today(), tipo: 'VENTA',
            descripcion: `${prod.nombre} × ${item.cantidad}`, pedido_ref: p.numero,
            insumo_id: r.insumo_id, cantidad_base: r.cantidad * item.cantidad,
            cantidad_real: r.cantidad * item.cantidad, notas: 'Auto-registrado' });
        }
      }
    }

  toast('Estado actualizado ✓'); closeModal(); renderPedidos();
}

async function modalEntrega(pedidoId) {

    <div><div style="font-size:11px;color:var(--muted)">Pagado</div><input type="text" class="cuota-pagado" value="${c.monto_pagado ? Math.round(c.monto_pagado).toLocaleString('es-PY') : '0'}" data-id="${c.id}" style="font-size:13px" oninput="recalcCuotasTotals()"></div>
    <label style="display:flex;align-items:center;gap:4px;font-size:12px;cursor:pointer">
      <input type="checkbox" class="cuota-check" data-id="${c.id}" ${c.pagada?'checked':''} onchange="onCuotaCheck(this)"> Pagada</label></div>`).join('');
  openModal(`Cuotas — ${p?.numero || ''}`, `
    <div style="display:flex;justify-content:space-between;margin-bottom:16px" id="cuotas-summary">
      <div><span style="color:var(--muted)">Total:</span> <strong>${fmt(total)}</strong></div>
      <div><span style="color:var(--muted)">Pagado:</span> <strong id="cuotas-pagado-total" style="color:var(--success)">${fmt(totalPagado)}</strong></div>
      <div><span style="color:var(--muted)">Saldo:</span> <strong id="cuotas-saldo-total" style="color:var(--warn)">${fmt(total - totalPagado)}</strong></div>
    </div>${cuotasHTML}`,
    `<button class="btn-secondary" onclick="closeModal()">Cerrar</button>
     <button class="btn-primary" onclick="saveCuotas(${pedidoId})">Guardar pagos</button>`);
}
function onCuotaCheck(checkbox) {
  const row = checkbox.closest('[data-cuota-id]');
  const pagadoInput = row.querySelector('.cuota-pagado');
  if (checkbox.checked) {
    // Auto-fill with expected amount
    const esperado = parseFloat(row.dataset.montoEsperado) || 0;
    pagadoInput.value = Math.round(esperado).toLocaleString('es-PY');
  } else {
    pagadoInput.value = '0';
  }
  recalcCuotasTotals();
}
function parseCuotaValue(str) {
  if (!str) return 0;
  // Remove thousand separators (dots) and handle commas
  return parseFloat(str.replace(/\./g, '').replace(/,/g, '')) || 0;
}
function recalcCuotasTotals() {
  let totalPagado = 0;
  document.querySelectorAll('[data-cuota-id]').forEach(row => {
    totalPagado += parseCuotaValue(row.querySelector('.cuota-pagado')?.value);
  });
  const total = window._cuotasTotal || 0;
  const pagadoEl = document.getElementById('cuotas-pagado-total');
  const saldoEl = document.getElementById('cuotas-saldo-total');
  if (pagadoEl) pagadoEl.textContent = fmt(totalPagado);
  if (saldoEl) saldoEl.textContent = fmt(total - totalPagado);
}
async function saveCuotas(pedidoId) {
  const data = [...document.querySelectorAll('[data-cuota-id]')].map(div => ({
    id: parseInt(div.dataset.cuotaId),
    monto_pagado: parseCuotaValue(div.querySelector('.cuota-pagado')?.value),
    pagada: div.querySelector('.cuota-check')?.checked ? 1 : 0,
    fecha_pago: div.querySelector('.cuota-check')?.checked ? today() : ''
  }));
  await api(`/api/pedidos/${pedidoId}/cuotas`, 'PUT', data);
  toast('Pagos actualizados ✓'); closeModal(); renderPedidos();
}

async function renderStock() {

  const vendidos = items.filter(i => i.estado === 'Vendido');

  const totalRevendido = vendidos.reduce((s,i) => s + (i.cantidad * i.valor_unit), 0);
  const totalPerdida = baja.reduce((s,i) => s + (i.cantidad * i.valor_unit), 0);
  const rows = items.map(i => {
    const prodName = i.producto_nombre || '—';
    const desc = i.descripcion || '—';
    const origen = i.pedido_numero ? `<span class="badge badge-warn">${i.pedido_numero}</span>` : `<span class="badge badge-lime">Producción</span>`;
    let acciones = '';
    if (i.estado === 'Disponible') {
      acciones = `<div style="display:flex;gap:4px">
        <button class="btn-primary btn-sm" onclick="modalSalidaStock(${i.id})">📤 Salida</button>

    return `<tr style="${i.estado!=='Disponible'?'opacity:0.5':''}">
      <td>${i.fecha}</td><td>${origen}</td>

      <td style="max-width:140px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:default;font-size:12px;color:var(--muted)" title="${desc}">${desc}</td>
      <td>${i.cantidad}</td><td>${fmt(i.valor_unit)}</td><td>${fmt(i.cantidad * i.valor_unit)}</td>
      <td>${i.motivo||'—'}</td>
      <td><span class="badge ${estadoBadge}">${i.estado}</span></td>
      <td>${acciones}</td></tr>`;

  const productos = await api('/api/productos');
  const prodOpts = productos.map(p => `<option value="${p.id}" data-precio="${p.precio_sugerido||0}">${p.nombre}</option>`).join('');
  openModal('Nuevo producto para stock', `
    <div class="form-grid cols2">
      <div class="form-group" style="grid-column:1/-1"><div class="form-label">Producto</div>

function onStkProdChange() {
  const sel = document.getElementById('stk-prod');
  if (!sel) return;
  const precio = sel.options[sel.selectedIndex]?.dataset?.precio || 0;
  document.getElementById('stk-valor').value = precio;
}
async function saveNuevoStock() {
  const sel = document.getElementById('stk-prod');
  const prodId = v('stk-prod');
  const prodName = sel?.options[sel.selectedIndex]?.text || '';
  const desc = v('stk-desc') || prodName;
  const cant = parseInt(v('stk-cant')) || 1;
  await api('/api/stock_reingreso', 'POST', {
    producto_id: prodId, descripcion: desc,
    cantidad: cant, valor_unit: numVal('stk-valor'),
    motivo: 'Producción para stock'
  });
  // Auto-consume insumos from receta (6)
  const productos = await api('/api/productos');
  const prod = productos.find(p => p.id == prodId);
  if (prod && prod.receta && prod.receta.length > 0) {
    for (const r of prod.receta) {
      await api('/api/consumos', 'POST', {
        fecha: today(), tipo: 'VENTA',
        descripcion: `Stock: ${prodName} × ${cant}`,
        pedido_ref: '', insumo_id: r.insumo_id,
        cantidad_base: r.cantidad * cant,
        cantidad_real: r.cantidad * cant,
        notas: 'Consumo automático — producción para stock'
      });
    }
  }
  toast('Producto agregado al stock ✓'); closeModal(); renderStock(); updateAlertBadge();
}

  openModal('📤 Dar salida de stock', `
    <div class="card" style="margin-bottom:16px;background:var(--bg3)">
      <div style="font-size:13px;color:var(--muted);margin-bottom:4px">Producto</div>
      <div style="font-size:16px;font-weight:700">${item.descripcion||'Producto'}</div>
      <div style="font-size:13px;color:var(--muted);margin-top:8px">Valor original: <strong style="color:var(--cyan)">${fmt(item.valor_unit)}</strong></div>
    </div>
    <div class="form-grid cols2">
      <div class="form-group" style="position:relative"><div class="form-label">Cliente</div>
        <input id="sal-cliente" autocomplete="off" oninput="buscarClienteSalida(this.value)">
        <div id="sal-cliente-list" class="autocomplete-list" style="display:none"></div></div>
      <div class="form-group"><div class="form-label">Teléfono</div><input id="sal-tel"></div>
      <div class="form-group"><div class="form-label">Monto de venta (₲)</div><input id="sal-monto" type="number" value="${item.valor_unit * item.cantidad}"></div>
    </div>`,
    `<button class="btn-secondary" onclick="closeModal()">Cancelar</button>
     <button class="btn-primary" onclick="confirmarSalida(${stockId})">Confirmar venta</button>`);
}

async function buscarClienteSalida(q) {
  const list = document.getElementById('sal-cliente-list');
  if (q.length < 2) { list.style.display = 'none'; return; }
  const clientes = await api(`/api/clientes/buscar?q=${encodeURIComponent(q)}`);
  let html = clientes.map(c => `<div class="autocomplete-item" onclick="selectClienteSalida(${c.id},'${(c.nombre+' '+(c.apellido||'')).replace(/'/g,"\\'")}','${(c.telefono||'').replace(/'/g,"\\'")}')">
    <strong>${c.nombre} ${c.apellido||''}</strong></div>`).join('');
  if (clientes.length === 0) html = `<div class="autocomplete-item" style="color:var(--muted)">Sin resultados</div>`;
  list.innerHTML = html; list.style.display = 'block';
}
function selectClienteSalida(id, nombre, tel) {
  document.getElementById('sal-cliente').value = nombre;
  document.getElementById('sal-cliente').dataset.clienteId = id;
  document.getElementById('sal-tel').value = tel;
  document.getElementById('sal-cliente-list').style.display = 'none';
}

async function confirmarSalida(stockId) {
  const r = await api(`/api/stock_reingreso/${stockId}/salida`, 'POST', {
    cliente: v('sal-cliente'),
    cliente_id: document.getElementById('sal-cliente')?.dataset?.clienteId || null,
    telefono: v('sal-tel'),
    monto: numVal('sal-monto'),
  });
  toast(`Venta registrada como ${r.numero} ✓`); closeModal(); renderStock(); updateAlertBadge();
}

// ── INVENTARIO (antes "Equipos") (A, B) ───────────────────────────
async function renderInventario() {
  const [equipos, prestamos] = await Promise.all([api('/api/equipos'), api('/api/prestamos')]);
  const totalAmort = equipos.filter(e=>e.activo).reduce((s,e)=>s+e.amort_mensual,0);
  const rowsEq = equipos.map(e => {
    const off = !e.activo; const bg = e.activo ? 'var(--success)' : 'var(--bg3)'; const dx = e.activo ? '18px' : '2px';
    return `<tr style="${off?'opacity:0.4':''}">
      <td><strong>${e.nombre}</strong></td><td>${e.cantidad||1}</td><td>${e.fecha_compra||'—'}</td>
      <td>${fmt(e.costo_total)}</td><td>${e.vida_util_meses} meses</td><td>${fmt(e.valor_residual)}</td>
      <td style="color:var(--cyan)">${fmt(e.amort_mensual)}/mes</td><td>${e.meses_transcurridos} meses</td><td>${fmt(e.valor_actual)}</td>
      <td><div style="display:flex;align-items:center;gap:4px;cursor:pointer" onclick="toggleEquipo(${e.id})" title="${e.activo?'Activo':'Inactivo'}">
        <div style="width:36px;height:20px;border-radius:10px;background:${bg};position:relative;transition:background .3s">
          <div style="width:16px;height:16px;border-radius:50%;background:#fff;position:absolute;top:2px;left:${dx};transition:left .3s"></div></div>
        <span style="font-size:11px;color:${e.activo?'var(--success)':'var(--muted)'}">${e.activo?'Activo':'Inactivo'}</span></div></td>
      <td><div style="display:flex;gap:4px">
        <button class="btn-sm" style="background:var(--cyan);color:#000" onclick='modalEditEquipo(${JSON.stringify(e)})'>✏️</button>
        <button class="btn-danger btn-sm" onclick="delEquipo(${e.id},\`${e.nombre}\`)">🗑</button></div></td></tr>`;
  }).join('');
  // Prestamos with +/- buttons (C)
  const rowsPrest = prestamos.map(p => {
    const pct = p.progreso_pct || 0;
    const barColor = pct >= 100 ? 'var(--success)' : pct > 60 ? 'var(--lime)' : 'var(--cyan)';
    return `<tr><td><strong>${p.descripcion}</strong></td><td style="color:var(--muted)">${p.entidad||'—'}</td>
      <td>${fmt(p.monto_total)}</td><td>${fmt(p.monto_adjudicado)}</td><td>${fmt(p.cuota_mensual)}/mes</td><td>${p.cuotas}</td>
      <td><div style="display:flex;align-items:center;gap:6px">
        <button class="cuota-btn btn-danger" onclick="changeCuotaPrestamo(${p.id},-1)">−</button>
        <strong>${p.cuotas_pagadas}</strong>
        <button class="cuota-btn btn-primary" onclick="changeCuotaPrestamo(${p.id},1)">+</button></div></td>
      <td><div style="display:flex;align-items:center;gap:6px">
        <div style="flex:1;height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;min-width:60px">
          <div style="height:100%;width:${pct}%;background:${barColor};border-radius:4px;transition:width .4s"></div></div>
        <span style="font-size:11px;color:var(--muted);white-space:nowrap">${p.cuotas_pagadas}/${p.cuotas}</span></div></td>
      <td style="color:${p.saldo_pendiente>0?'var(--warn)':'var(--success)'};font-weight:700">${fmt(p.saldo_pendiente)}</td>
      <td><div style="display:flex;gap:4px">
        <button class="btn-sm" style="background:var(--cyan);color:#000" onclick="modalEditPrestamo(${p.id})">✏️</button>
        <button class="btn-danger btn-sm" onclick="delPrestamo(${p.id})">🗑</button></div></td></tr>`;
  }).join('');
  document.getElementById('content').innerHTML = `
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab(this,'tab-equipos-list')">🖨️ Inventario</button>
      <button class="tab-btn" onclick="switchTab(this,'tab-prestamos')">💳 Préstamos</button></div>
    <div class="tab-content active" id="tab-equipos-list">
      <div class="toolbar"><button class="btn-primary" onclick="modalNuevoEquipo()">+ Nuevo equipo</button></div>
      <div class="card" style="padding:0;overflow:hidden;margin-bottom:16px"><table><thead><tr>
        <th>Equipo</th><th>Cant.</th><th>Fecha compra</th><th>Costo total</th><th>Vida útil</th><th>Valor residual</th>
        <th>Amort. mensual</th><th>Meses trans.</th><th>Valor actual</th><th>Estado</th><th>Acciones</th></tr></thead>
        <tbody>${rowsEq || emptyState('Sin equipos')}</tbody></table></div>
      <div class="card" style="display:flex;align-items:center;gap:20px">
        <div style="font-size:13px;color:var(--muted)">Amortización total mensual</div>
        <div style="font-size:24px;font-weight:800;color:var(--cyan)">${fmt(totalAmort)}</div></div></div>
    <div class="tab-content" id="tab-prestamos">
      <div class="toolbar"><button class="btn-primary" onclick="modalNuevoPrestamo()">+ Nuevo préstamo</button></div>
      <div class="card" style="padding:0;overflow:hidden"><table><thead><tr>
        <th>Descripción</th><th>Entidad</th><th>Monto total</th><th>Adjudicado</th><th>Cuota mensual</th><th>Cuotas</th>
        <th>Pagadas</th><th>Progreso</th><th>Saldo</th><th>Acciones</th></tr></thead>
        <tbody>${rowsPrest || emptyState('Sin préstamos')}</tbody></table></div></div>`;
}

// ── HELPERS UI ────────────────────────────────────────────────────
function filterTable(input, tableId) {
  const q = input.value.toLowerCase();
  const tipo = document.getElementById('fil-tipo')?.value.toLowerCase() || '';
  document.querySelectorAll(`#${tableId} tbody tr`).forEach(tr => {
    const text = tr.textContent.toLowerCase();
    tr.style.display = (!q || text.includes(q)) && (!tipo || text.includes(tipo)) ? '' : 'none';
  });
}

// Sortable columns (1 & 7)
function makeSortable() {
  document.querySelectorAll('table thead th').forEach(th => {
    if (th.dataset.sortBound) return;
    th.dataset.sortBound = '1';
    // Add sort arrow if not already there
    if (!th.querySelector('.sort-arrow')) {
      th.innerHTML = th.innerHTML + '<span class="sort-arrow">⇅</span>';
    }
    th.addEventListener('click', function() {
      const table = this.closest('table');
      const tbody = table.querySelector('tbody');
      if (!tbody) return;
      const idx = [...this.parentElement.children].indexOf(this);
      const rows = [...tbody.querySelectorAll('tr')].filter(r => !r.querySelector('.empty-state'));
      if (rows.length === 0) return;
      const isAsc = this.classList.contains('sorted-asc');
      // Clear all
      this.parentElement.querySelectorAll('th').forEach(h => h.classList.remove('sorted-asc','sorted-desc'));
      this.classList.add(isAsc ? 'sorted-desc' : 'sorted-asc');
      rows.sort((a, b) => {
        let aVal = a.children[idx]?.textContent?.trim() || '';
        let bVal = b.children[idx]?.textContent?.trim() || '';
        // Try numeric (remove ₲, dots, spaces)
        const aNum = parseFloat(aVal.replace(/[₲\s\.]/g, '').replace(/,/g, '.'));
        const bNum = parseFloat(bVal.replace(/[₲\s\.]/g, '').replace(/,/g, '.'));
        if (!isNaN(aNum) && !isNaN(bNum)) {
          return isAsc ? bNum - aNum : aNum - bNum;
        }
        return isAsc ? bVal.localeCompare(aVal, 'es') : aVal.localeCompare(bVal, 'es');
      });
      rows.forEach(r => tbody.appendChild(r));
    });
  });
}
// Auto-apply sortable after navigation
const origNavigate = navigate;
navigate = function(page) {
  origNavigate(page);
  setTimeout(makeSortable, 200);
};
function switchTab(btn, tabId) {
  btn.closest('.tabs').querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  let el = btn.closest('.tabs').nextElementSibling;
  while (el) { if (el.classList?.contains('tab-content')) el.classList.remove('active'); el = el.nextElementSibling; }
  document.getElementById(tabId)?.classList.add('active');
}
function emptyState(msg, sub='') {
  return `<tr><td colspan="20"><div class="empty-state"><img src="/static/img/PIXIE.png" alt=""><p>${msg}</p><small>${sub}</small></div></td></tr>`;
}
function exportCSV() {
  const tablas = ['insumos','pedidos','gastos','consumos','marketing','equipos','clientes','stock_reingreso'];
  const menu = tablas.map(t => `<button class="btn-secondary" style="width:100%;margin-bottom:8px;text-align:left"
    onclick="window.open('/api/export/${t}','_blank');closeModal()">⬇ Exportar ${t}.csv</button>`).join('');
  openModal('Exportar datos', menu, `<button class="btn-secondary" onclick="closeModal()">Cerrar</button>`);
}
