<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PIXEL90 — Sistema de Gestión</title>
<link rel="icon" type="image/png" href="{{ url_for('static', filename='img/favicon2.png') }}">
<style>
/* ── RESET & VARS ─────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --cyan:    #00E5FF;
  --magenta: #FF00C8;
  --lime:    #AAFF00;
  --orange:  #FF6B00;
  --bg:      #0A0A0F;
  --bg2:     #111118;
  --bg3:     #1A1A24;
  --bg4:     #22222E;
  --border:  #2A2A3A;
  --text:    #E8E8F0;
  --muted:   #888899;
  --danger:  #FF4455;
  --success: #00FF88;
  --warn:    #FFB700;
  --font:    'Segoe UI', system-ui, sans-serif;
  --radius:  10px;
}
body { background: var(--bg); color: var(--text); font-family: var(--font); font-size: 14px; overflow-x: hidden; }
a { color: var(--cyan); text-decoration: none; }
input, select, textarea {
  background: var(--bg3); border: 1px solid var(--border); color: var(--text);
  border-radius: 6px; padding: 8px 12px; font-size: 14px; font-family: var(--font);
  outline: none; width: 100%; transition: border-color .2s;
}
input:focus, select:focus, textarea:focus { border-color: var(--cyan); }
button {
  cursor: pointer; border: none; border-radius: 6px; padding: 8px 16px;
  font-size: 13px; font-weight: 600; font-family: var(--font); transition: all .15s;
}
.btn-primary { background: var(--cyan); color: #000; }
.btn-primary:hover { background: #00c8e0; }
.btn-secondary { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
.btn-secondary:hover { border-color: var(--cyan); color: var(--cyan); }
.btn-danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
.btn-danger:hover { background: var(--danger); color: #fff; }
.btn-sm { padding: 5px 10px; font-size: 12px; }
table { width: 100%; border-collapse: collapse; }
th { background: var(--bg3); color: var(--muted); font-size: 11px; font-weight: 600;
     text-transform: uppercase; letter-spacing: .06em; padding: 10px 14px; text-align: left; }
td { padding: 11px 14px; border-bottom: 1px solid var(--border); vertical-align: middle; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(0,229,255,.03); }
.badge {
  display: inline-block; padding: 2px 9px; border-radius: 20px; font-size: 11px; font-weight: 700;
}
.badge-ok       { background: rgba(0,255,136,.15); color: var(--success); }
.badge-warn     { background: rgba(255,183,0,.15);  color: var(--warn); }
.badge-danger   { background: rgba(255,68,85,.15);  color: var(--danger); }
.badge-cyan     { background: rgba(0,229,255,.15);  color: var(--cyan); }
.badge-magenta  { background: rgba(255,0,200,.15);  color: var(--magenta); }
.badge-lime     { background: rgba(170,255,0,.15);  color: var(--lime); }
.badge-orange   { background: rgba(255,107,0,.15);  color: var(--orange); }
.card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
.section-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.form-grid { display: grid; gap: 12px; }
.form-grid.cols2 { grid-template-columns: 1fr 1fr; }
.form-grid.cols3 { grid-template-columns: 1fr 1fr 1fr; }
.form-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; text-transform: uppercase; letter-spacing: .05em; }
.form-group { display: flex; flex-direction: column; }
.divider { height: 1px; background: var(--border); margin: 16px 0; }
.empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
.empty-state img { width: 120px; margin-bottom: 16px; opacity: .7; border-radius: 12px; }
.empty-state p { font-size: 15px; margin-bottom: 8px; }
.empty-state small { font-size: 12px; }

/* ── LAYOUT ────────────────────────────────────────────────────── */
#app { display: flex; height: 100vh; }

/* ── SIDEBAR ────────────────────────────────────────────────────── */
#sidebar {
  width: 220px; min-width: 220px; background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; overflow-y: auto;
}
.sidebar-logo {
  padding: 20px 16px 12px;
  border-bottom: 1px solid var(--border);
}
.sidebar-logo { position: relative; }
.glitch-logo {
  position: relative;
  display: inline-block;
  width: 100%;
  max-width: 160px;
}
.glitch-logo img {
  width: 100%;
  display: block;
  position: relative;
  z-index: 1;
}
.glitch-logo::before,
.glitch-logo::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image: url('/static/img/logo.png');
  background-size: 100% 100%;
  width: 100%;
  height: 100%;
  opacity: 0.75;
}
.glitch-logo::before {
  animation: glitch-before 3.5s infinite steps(1);
  mix-blend-mode: screen;
  filter: hue-rotate(180deg) saturate(3);
}
.glitch-logo::after {
  animation: glitch-after 3.5s infinite steps(1);
  mix-blend-mode: screen;
  filter: hue-rotate(300deg) saturate(3);
}
@keyframes glitch-before {
  0%,89%        { clip-path: inset(100% 0 0 0);      transform: translate(0,0); }
  90%           { clip-path: inset(15% 0 70% 0);     transform: translate(-3px, 1px); }
  91%           { clip-path: inset(55% 0 20% 0);     transform: translate(3px,-1px); }
  92%           { clip-path: inset(30% 0 50% 0);     transform: translate(-2px, 2px); }
  93%           { clip-path: inset(70% 0 5%  0);     transform: translate(2px,-2px); }
  94%,100%      { clip-path: inset(100% 0 0 0);      transform: translate(0,0); }
}
@keyframes glitch-after {
  0%,89%        { clip-path: inset(100% 0 0 0);      transform: translate(0,0); }
  90%           { clip-path: inset(40% 0 40% 0);     transform: translate(3px,-1px); }
  91%           { clip-path: inset(10% 0 75% 0);     transform: translate(-3px, 1px); }
  92%           { clip-path: inset(60% 0 15% 0);     transform: translate(2px, 2px); }
  93%           { clip-path: inset(80% 0 2%  0);     transform: translate(-2px,-2px); }
  94%,100%      { clip-path: inset(100% 0 0 0);      transform: translate(0,0); }
}
.nav-section { padding: 12px 10px 4px; font-size: 10px; color: var(--muted);
               text-transform: uppercase; letter-spacing: .1em; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 14px; border-radius: 8px; margin: 1px 8px;
  cursor: pointer; transition: all .15s; color: var(--muted); font-size: 13px;
}
.nav-item:hover { background: var(--bg3); color: var(--text); }
.nav-item.active { background: rgba(0,229,255,.1); color: var(--cyan); font-weight: 600; }
.nav-item .icon { font-size: 16px; width: 20px; text-align: center; }
.sidebar-mascot { padding: 16px; margin-top: auto; }
.sidebar-mascot img { width: 100%; border-radius: 12px; opacity: .85; }

/* ── MAIN ────────────────────────────────────────────────────────── */
#main { flex: 1; overflow-y: auto; display: flex; flex-direction: column; }
.topbar {
  background: var(--bg2); border-bottom: 1px solid var(--border);
  padding: 14px 24px; display: flex; align-items: center; justify-content: space-between;
  position: sticky; top: 0; z-index: 10;
}
.topbar-title { font-size: 16px; font-weight: 700; }
.topbar-sub   { font-size: 12px; color: var(--muted); }
#content { padding: 24px; flex: 1; }

/* ── TABS ────────────────────────────────────────────────────────── */
.tabs { display: flex; gap: 4px; margin-bottom: 20px; border-bottom: 1px solid var(--border); padding-bottom: 0; }
.tab-btn { background: none; color: var(--muted); border: none; border-bottom: 2px solid transparent;
           border-radius: 0; padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer;
           margin-bottom: -1px; transition: all .15s; }
.tab-btn:hover { color: var(--text); }
.tab-btn.active { color: var(--cyan); border-bottom-color: var(--cyan); }
.tab-content { display: none; }
.tab-content.active { display: block; }

/* ── DASHBOARD KPIs ──────────────────────────────────────────────── */
.kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
.kpi-card {
  background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 18px 20px; position: relative; overflow: hidden;
}
.kpi-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
}
.kpi-card.cyan::before   { background: var(--cyan); }
.kpi-card.magenta::before{ background: var(--magenta); }
.kpi-card.lime::before   { background: var(--lime); }
.kpi-card.orange::before { background: var(--orange); }
.kpi-label { font-size: 11px; color: var(--muted); text-transform: uppercase;
             letter-spacing: .07em; margin-bottom: 8px; }
.kpi-value { font-size: 22px; font-weight: 800; }
.kpi-sub   { font-size: 11px; color: var(--muted); margin-top: 4px; }

/* ── CHARTS ──────────────────────────────────────────────────────── */
.chart-row { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; margin-bottom: 24px; }
.chart-wrap { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
.chart-title { font-size: 13px; font-weight: 700; margin-bottom: 16px; color: var(--muted); text-transform: uppercase; letter-spacing: .05em; }
.bar-chart { display: flex; align-items: flex-end; gap: 6px; height: 160px; padding-top: 28px; position: relative; }
.bar-col { flex: 1; display: flex; flex-direction: column; align-items: center; position: relative; }
.bar-wrap { display: flex; gap: 3px; align-items: flex-end; width: 100%; height: 130px; }
.bar {
  flex: 1; border-radius: 3px 3px 0 0; min-height: 3px;
  transition: height .4s ease, opacity .15s;
  cursor: pointer; position: relative;
}
.bar:hover { opacity: .75; }
.bar-label { font-size: 10px; color: var(--muted); text-align: center; margin-top: 6px; }
.bar-top-label {
  position: absolute; top: -20px; left: 50%; transform: translateX(-50%);
  font-size: 9px; font-weight: 700; white-space: nowrap; opacity: 0;
  transition: opacity .15s; pointer-events: none;
}
.bar-col:hover .bar-top-label { opacity: 1; }
/* Tooltip */
.chart-tooltip {
  position: absolute; background: var(--bg3); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 14px; font-size: 12px; pointer-events: none;
  z-index: 20; min-width: 160px; opacity: 0; transition: opacity .15s;
  box-shadow: 0 4px 20px rgba(0,0,0,.4);
}
.chart-tooltip.visible { opacity: 1; }
.chart-tooltip .tt-mes  { font-weight: 700; margin-bottom: 6px; font-size: 13px; }
.chart-tooltip .tt-row  { display: flex; justify-content: space-between; gap: 16px; padding: 2px 0; }
.chart-tooltip .tt-dot  { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 5px; }
.chart-tooltip .tt-gan  { border-top: 1px solid var(--border); margin-top: 5px; padding-top: 5px; font-weight: 700; }
.donut-wrap { display: flex; flex-direction: column; gap: 8px; }
.donut-item { display: flex; align-items: center; gap: 10px; }
.donut-dot  { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.donut-label{ flex: 1; font-size: 12px; }
.donut-val  { font-size: 12px; font-weight: 700; }

/* ── ALERT LIST ──────────────────────────────────────────────────── */
.alert-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 14px; background: rgba(255,68,85,.06);
  border: 1px solid rgba(255,68,85,.2); border-radius: 8px; margin-bottom: 8px;
}
.alert-icon { font-size: 18px; }
.alert-name { flex: 1; font-size: 13px; font-weight: 600; }
.alert-stock { font-size: 12px; color: var(--danger); }

/* ── MODAL ───────────────────────────────────────────────────────── */
.modal-bg {
  position: fixed; inset: 0; background: rgba(0,0,0,.7);
  display: flex; align-items: center; justify-content: center;
  z-index: 100; opacity: 0; pointer-events: none; transition: opacity .2s;
}
.modal-bg.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--bg2); border: 1px solid var(--border);
  border-radius: 14px; padding: 28px; width: 90%; max-width: 560px;
  max-height: 90vh; overflow-y: auto;
  transform: translateY(20px); transition: transform .2s;
}
.modal-bg.open .modal { transform: translateY(0); }
.modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
.modal-title { font-size: 17px; font-weight: 800; }
.modal-close { background: var(--bg3); border: none; color: var(--muted); width: 30px; height: 30px;
               border-radius: 50%; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.modal-close:hover { background: var(--danger); color: #fff; }
.modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

/* ── TOOLBAR ─────────────────────────────────────────────────────── */
.toolbar { display: flex; gap: 10px; margin-bottom: 16px; align-items: center; flex-wrap: wrap; }
.toolbar-search { flex: 1; min-width: 160px; max-width: 280px; }
.toolbar input { background: var(--bg3); }

/* ── STATUS COLORS ───────────────────────────────────────────────── */
.estado-Pendiente     { color: var(--warn); }
.estado-En.Producción { color: var(--cyan); }
.estado-Listo         { color: var(--lime); }
.estado-Entregado     { color: var(--success); }
.estado-Cancelado     { color: var(--danger); }

/* ── COSTOS BREAKDOWN ────────────────────────────────────────────── */
.cost-row { display: flex; justify-content: space-between; padding: 8px 0;
            border-bottom: 1px solid var(--border); font-size: 13px; }
.cost-row.total { font-weight: 800; font-size: 15px; border-bottom: none; color: var(--cyan); padding-top: 12px; }
.cost-row.precio-min  { font-weight: 800; font-size: 15px; border-bottom: none; color: var(--lime); }
.cost-row.precio-sug  { font-weight: 800; font-size: 16px; border-bottom: none; color: var(--magenta); }
.cost-label { color: var(--muted); }

/* ── TOASTS ──────────────────────────────────────────────────────── */
#toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 999; display: flex; flex-direction: column; gap: 8px; }
.toast {
  background: var(--bg3); border: 1px solid var(--border);
  padding: 12px 18px; border-radius: 8px; font-size: 13px;
  animation: slideIn .2s ease; min-width: 220px;
}
.toast.success { border-color: var(--success); color: var(--success); }
.toast.error   { border-color: var(--danger);  color: var(--danger); }
@keyframes slideIn { from { transform: translateX(40px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* ── GLITCH EFFECT FOR LOGO ─────────────────────────────────────── */
@keyframes glitch {
  0%,90%,100% { text-shadow: none; }
  92% { text-shadow: 2px 0 var(--cyan), -2px 0 var(--magenta); }
  95% { text-shadow: -2px 0 var(--cyan), 2px 0 var(--magenta); }
}
.glitch-text { animation: glitch 4s infinite; }

/* ── SCROLLBAR ───────────────────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--muted); }

/* ── RESPONSIVE ──────────────────────────────────────────────────── */
@media (max-width: 768px) {
  #sidebar { width: 60px; min-width: 60px; }
  .nav-item span { display: none; }
  .nav-section { display: none; }
  .sidebar-logo img { display: none; }
  .kpi-grid { grid-template-columns: 1fr 1fr; }
  .chart-row { grid-template-columns: 1fr; }
  .form-grid.cols2, .form-grid.cols3 { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<div id="app">
<!-- ── SIDEBAR ───────────────────────────────────────────────────── -->
<nav id="sidebar">
  <div class="sidebar-logo">
    <div class="glitch-logo">
      <img src="/static/img/logo.png" alt="PIXEL90">
    </div>
  </div>

  <div class="nav-section">Principal</div>
  <div class="nav-item active" onclick="navigate('dashboard')">
    <span class="icon">📊</span><span>Dashboard</span>
  </div>

  <div class="nav-section">Producción</div>
  <div class="nav-item" onclick="navigate('inventario')">
    <span class="icon">📦</span><span>Inventario</span>
  </div>
  <div class="nav-item" onclick="navigate('consumos')">
    <span class="icon">📋</span><span>Consumos</span>
  </div>
  <div class="nav-item" onclick="navigate('productos')">
    <span class="icon">🧾</span><span>Productos</span>
  </div>

  <div class="nav-section">Comercial</div>
  <div class="nav-item" onclick="navigate('pedidos')">
    <span class="icon">🛒</span><span>Pedidos</span>
  </div>
  <div class="nav-item" onclick="navigate('gastos')">
    <span class="icon">💸</span><span>Gastos</span>
  </div>
  <div class="nav-item" onclick="navigate('marketing')">
    <span class="icon">📣</span><span>Marketing</span>
  </div>

  <div class="nav-section">Ajustes</div>
  <div class="nav-item" onclick="navigate('equipos')">
    <span class="icon">🖨️</span><span>Equipos</span>
  </div>
  <div class="nav-item" onclick="navigate('parametros')">
    <span class="icon">⚙️</span><span>Parámetros</span>
  </div>

  <div class="sidebar-mascot">
    <img src="/static/img/PIXIE.png" alt="mascota">
  </div>
</nav>

<!-- ── MAIN ──────────────────────────────────────────────────────── -->
<div id="main">
  <div class="topbar">
    <div>
      <div class="topbar-title glitch-text" id="page-title">Dashboard</div>
      <div class="topbar-sub" id="page-sub">Resumen del negocio</div>
    </div>
    <div style="display:flex;gap:8px">
      <button class="btn-secondary btn-sm" onclick="exportCSV()">⬇ Exportar</button>
    </div>
  </div>
  <div id="content"></div>
</div>
</div>

<!-- ── MODAL ─────────────────────────────────────────────────────── -->
<div class="modal-bg" id="modal-bg" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">Modal</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<!-- ── TOAST ─────────────────────────────────────────────────────── -->
<div id="toast-container"></div>

<script>
// ── UTILS ─────────────────────────────────────────────────────────
const fmt = n => new Intl.NumberFormat('es-PY').format(Math.round(n || 0)) + ' ₲';
const fmtN = n => new Intl.NumberFormat('es-PY').format(+(n || 0).toFixed(2));
const today = () => new Date().toISOString().split('T')[0];

function toast(msg, type='success') {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

async function api(url, method='GET', body=null) {
  const opts = { method, headers: {'Content-Type':'application/json'} };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(url, opts);
  if (!r.ok) { toast('Error en la petición','error'); throw new Error(r.status); }
  return r.json();
}

function openModal(title, bodyHTML, footerHTML='') {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = bodyHTML;
  document.getElementById('modal-footer').innerHTML = footerHTML;
  document.getElementById('modal-bg').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal-bg'))
    document.getElementById('modal-bg').classList.remove('open');
}

const CAT_COLORS = {
  'Sublimación':'cyan','DTF':'magenta','Stickers':'lime',
  'Cuadros':'orange','General':'muted'
};
const TIPO_BADGE = {
  'VENTA':'badge-cyan','PRUEBA':'badge-lime','MERMA':'badge-danger',
  'CALIBRACIÓN':'badge-magenta','MUESTRA':'badge-orange','OTRO':'badge-warn'
};
const ESTADO_BADGE = {
  'Pendiente':'badge-warn','En Producción':'badge-cyan',
  'Listo':'badge-lime','Entregado':'badge-ok','Cancelado':'badge-danger'
};

// ── NAVIGATION ─────────────────────────────────────────────────────
const PAGES = {
  dashboard: { title: 'Dashboard', sub: 'Resumen del negocio' },
  inventario: { title: 'Inventario de Insumos', sub: 'Stock en unidades de consumo' },
  consumos:   { title: 'Consumos', sub: 'Ventas · Pruebas · Mermas · Calibraciones' },
  productos:  { title: 'Productos & Recetas', sub: 'Costos y precios mínimos' },
  pedidos:    { title: 'Pedidos & Clientes', sub: 'Historial de pedidos' },
  gastos:     { title: 'Gastos', sub: 'Egresos por categoría' },
  marketing:  { title: 'Marketing', sub: 'Campañas y ROI' },
  equipos:    { title: 'Equipos', sub: 'Amortización de maquinaria' },
  parametros: { title: 'Parámetros', sub: 'Configuración del negocio' },
};

let currentPage = '';
function navigate(page) {
  currentPage = page;
  document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
  document.querySelector(`[onclick="navigate('${page}')"]`)?.classList.add('active');
  const p = PAGES[page] || {};
  document.getElementById('page-title').textContent = p.title || page;
  document.getElementById('page-sub').textContent = p.sub || '';
  const renderers = {
    dashboard: renderDashboard, inventario: renderInventario,
    consumos: renderConsumos, productos: renderProductos,
    pedidos: renderPedidos, gastos: renderGastos,
    marketing: renderMarketing, equipos: renderEquipos,
    parametros: renderParametros,
  };
  (renderers[page] || (() => {}))();
}

// ── DASHBOARD ─────────────────────────────────────────────────────
async function renderDashboard() {
  const d = await api('/api/dashboard');
  const MONTHS = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];
  const MONTHS_FULL = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
  const [yr, mo] = (d.mes_referencia || '').split('-');
  const mesLabel = yr ? `${MONTHS_FULL[parseInt(mo)-1]} ${yr}` : 'Mes actual';
  const maxV = Math.max(...d.historico.map(m => Math.max(m.ventas, m.gastos)), 1);

  const bars = d.historico.map((m, idx) => {
    const hv = Math.max(Math.round((m.ventas / maxV) * 130), m.ventas > 0 ? 3 : 0);
    const hg = Math.max(Math.round((m.gastos / maxV) * 130), m.gastos > 0 ? 3 : 0);
    const label = MONTHS[parseInt(m.mes.split('-')[1]) - 1];
    const gan = m.ventas - m.gastos;
    const ganColor = gan >= 0 ? 'var(--success)' : 'var(--danger)';
    return `
      <div class="bar-col" id="bar-col-${idx}"
           onmouseenter="showTooltip(${idx})" onmouseleave="hideTooltip()">
        <div class="bar-top-label" style="color:var(--cyan)">${m.ventas > 0 ? fmt(m.ventas) : ''}</div>
        <div class="bar-wrap">
          <div class="bar" style="background:var(--cyan);height:${hv}px"
               data-ventas="${m.ventas}" data-gastos="${m.gastos}" data-mes="${m.mes}"></div>
          <div class="bar" style="background:var(--magenta);height:${hg}px"></div>
        </div>
        <div class="bar-label">${label}</div>
      </div>`;
  }).join('');

  const alertHTML = d.alertas.length
    ? d.alertas.map(a => `<div class="alert-item">
        <span class="alert-icon">⚠️</span>
        <span class="alert-name">${a.nombre}</span>
        <span class="alert-stock">Stock: ${fmtN(a.stock)} / Mín: ${fmtN(a.minimo)}</span>
        <button class="btn-danger btn-sm" onclick="navigate('inventario')">Ver</button>
      </div>`).join('')
    : `<div class="empty-state" style="padding:20px">
        <p>✅ Todos los insumos tienen stock suficiente</p>
      </div>`;

  const catColors = ['var(--cyan)','var(--magenta)','var(--lime)','var(--orange)'];
  const catHTML = d.por_categoria.map((c,i) => `
    <div class="donut-item">
      <div class="donut-dot" style="background:${catColors[i%4]}"></div>
      <span class="donut-label">${c.categoria}</span>
      <span class="donut-val">${fmt(c.total)}</span>
    </div>`).join('') || `<div style="color:var(--muted);font-size:13px">Sin ventas este mes</div>`;

  document.getElementById('content').innerHTML = `
    <div class="kpi-grid">
      <div class="kpi-card cyan">
        <div class="kpi-label">Ventas — ${mesLabel}</div>
        <div class="kpi-value">${fmt(d.ventas_mes)}</div>
        <div class="kpi-sub">${d.pedidos_mes} pedidos</div>
      </div>
      <div class="kpi-card magenta">
        <div class="kpi-label">Gastos — ${mesLabel}</div>
        <div class="kpi-value">${fmt(d.gastos_mes)}</div>
      </div>
      <div class="kpi-card lime">
        <div class="kpi-label">Ganancia — ${mesLabel}</div>
        <div class="kpi-value" style="color:${d.ganancia>=0?'var(--success)':'var(--danger)'}">${fmt(d.ganancia)}</div>
        <div class="kpi-sub">Margen ${d.margen}%</div>
      </div>
      <div class="kpi-card orange">
        <div class="kpi-label">Pedidos pendientes</div>
        <div class="kpi-value">${d.pendientes}</div>
        <div class="kpi-sub">en producción</div>
      </div>
    </div>

    <div class="chart-row">
      <div class="chart-wrap" style="position:relative">
        <div class="chart-title">Ventas vs Gastos — últimos 6 meses</div>
        <div class="bar-chart" id="bar-chart-main">${bars}</div>
        <div style="display:flex;gap:16px;margin-top:8px;font-size:11px;color:var(--muted)">
          <span><span style="color:var(--cyan)">■</span> Ventas</span>
          <span><span style="color:var(--magenta)">■</span> Gastos</span>
        </div>
        <div class="chart-tooltip" id="chart-tooltip"></div>
      </div>
      <div class="chart-wrap">
        <div class="chart-title">Ventas por categoría</div>
        <div class="donut-wrap">${catHTML}</div>
      </div>
    </div>

    <div class="card">
      <div class="section-title">⚠️ Alertas de stock</div>
      ${alertHTML}
    </div>`;

  // Store historico for tooltip
  window._historico = d.historico;
}

const MONTHS_FULL = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

function showTooltip(idx) {
  const tt = document.getElementById('chart-tooltip');
  const col = document.getElementById(`bar-col-${idx}`);
  if (!tt || !col || !window._historico) return;
  const m = window._historico[idx];
  if (!m) return;
  const mes = m.mes.split('-');
  const mesNombre = MONTHS_FULL[parseInt(mes[1]) - 1] + ' ' + mes[0];
  const gan = m.ventas - m.gastos;
  const ganColor = gan >= 0 ? 'var(--success)' : 'var(--danger)';
  const margen = m.ventas > 0 ? ((gan / m.ventas) * 100).toFixed(1) : '0.0';

  tt.innerHTML = `
    <div class="tt-mes">${mesNombre}</div>
    <div class="tt-row">
      <span><span class="tt-dot" style="background:var(--cyan)"></span>Ventas</span>
      <strong style="color:var(--cyan)">${fmt(m.ventas)}</strong>
    </div>
    <div class="tt-row">
      <span><span class="tt-dot" style="background:var(--magenta)"></span>Gastos</span>
      <strong style="color:var(--magenta)">${fmt(m.gastos)}</strong>
    </div>
    <div class="tt-row tt-gan">
      <span>Ganancia</span>
      <strong style="color:${ganColor}">${fmt(gan)}</strong>
    </div>
    <div class="tt-row" style="font-size:11px;color:var(--muted)">
      <span>Margen</span><span>${margen}%</span>
    </div>`;

  // Position tooltip above/beside the bar column
  const chartRect = document.getElementById('bar-chart-main').getBoundingClientRect();
  const colRect = col.getBoundingClientRect();
  const ttW = 170;
  let left = colRect.left - chartRect.left + col.offsetWidth / 2 - ttW / 2;
  left = Math.max(0, Math.min(left, chartRect.width - ttW));
  tt.style.left = left + 'px';
  tt.style.bottom = (col.offsetHeight + 12) + 'px';
  tt.classList.add('visible');
}

function hideTooltip() {
  document.getElementById('chart-tooltip')?.classList.remove('visible');
}

let itemCount = 0;
function addItem() {
  itemCount++;
  const prods = JSON.parse(document.getElementById('pd-prods-json')?.textContent || '[]');
  const opts = prods.map(p =>
    `<option value="${p.id}" data-precio="${p.precio_sugerido||0}">${p.nombre}</option>`
  ).join('');
  const c = document.getElementById('items-container');
  const div = document.createElement('div');
  div.id = `item-${itemCount}`;
  div.style.cssText = 'display:grid;grid-template-columns:2fr 60px 1fr 30px;gap:8px;margin-bottom:8px;align-items:center';
  div.innerHTML = `
    <select class="item-prod" onchange="autocompletarPrecio(this)">
      <option value="" data-precio="0">— Producto —</option>${opts}
    </select>
    <input type="number" class="item-cant" value="1" min="1" oninput="recalcItem(this)">
    <div style="position:relative">
      <input type="number" class="item-precio" placeholder="Precio unit. ₲" style="padding-right:60px">
      <span class="precio-hint" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);
            font-size:10px;color:var(--muted);pointer-events:none">sugerido</span>
    </div>
    <button class="btn-danger btn-sm" onclick="this.parentElement.remove();calcTotal()">✕</button>`;
  c.appendChild(div);
}

function autocompletarPrecio(sel) {
  const precio = sel.options[sel.selectedIndex]?.dataset?.precio || 0;
  const row = sel.closest('div[id^="item-"]') || sel.parentElement;
  const precioInput = row.querySelector('.item-precio');
  if (precioInput && precio > 0) {
    precioInput.value = precio;
    precioInput.style.borderColor = 'var(--lime)';
    // Quitar highlight después de 2s
    setTimeout(() => precioInput.style.borderColor = '', 2000);
  }
  calcTotal();
}

function recalcItem(input) { calcTotal(); }

function calcTotal() {
  let total = 0;
  document.querySelectorAll('#items-container > div[id^="item-"]').forEach(row => {
    const cant = parseFloat(row.querySelector('.item-cant')?.value || 0);
    const precio = parseFloat(row.querySelector('.item-precio')?.value || 0);
    total += cant * precio;
  });
  const input = document.getElementById('pd-total');
  if (input) { input.value = Math.round(total); calcSaldo(); }
}

function calcSaldo() {
  const t = parseFloat(document.getElementById('pd-total')?.value||0);
  const a = parseFloat(document.getElementById('pd-adelanto')?.value||0);
  const s = document.getElementById('saldo-preview');
  if (s) s.textContent = `Saldo pendiente: ${fmt(t-a)}`;
}

    producto_id: div.querySelector('.item-prod')?.value || null,

    cantidad: parseFloat(div.querySelector('.item-cant')?.value||1),

  })).filter(i => i.precio_unit > 0);

async function saveEstado(id) {
  const pedidos = await api('/api/pedidos');
  const p = pedidos.find(x => x.id === id);
  if (!p) return;
  const nuevoEstado = document.getElementById('est-nuevo').value;
  await api(`/api/pedidos/${id}`, 'PUT', {...p, estado: nuevoEstado});
  closeModal();

  if (nuevoEstado === 'Entregado') {
    // Verificar si ya hay consumos registrados para este pedido
    const check = await api(`/api/pedidos/${id}/consumos_registrados`);

    if (!check.registrados && p.items && p.items.length > 0) {
      // Registrar consumos de receta solo si no existen todavía
      const todosProductos = await api('/api/productos');
      for (const item of p.items) {
        if (!item.producto_id) continue;
        const prod = todosProductos.find(x => x.id === item.producto_id);
        if (!prod) continue;
        for (const r of prod.receta) {
          await api('/api/consumos', 'POST', {
            fecha: today(),
            tipo: 'VENTA',
            descripcion: `${prod.nombre} × ${item.cantidad}`,
            pedido_ref: p.numero,
            insumo_id: r.insumo_id,
            cantidad_base: r.cantidad * item.cantidad,
            cantidad_real: r.cantidad * item.cantidad,
            notas: 'Registrado automáticamente al marcar como Entregado',
          });
        }
      }
    }

    // Preguntar por mermas — siempre, pero aclarando si los consumos ya estaban
    setTimeout(() => {
      const yaRegistrado = check.registrados
        ? `<p style="font-size:12px;color:var(--warn);margin-top:8px">⚠️ Los consumos de esta venta ya estaban registrados (${check.cantidad} registros). No se duplicaron.</p>`
        : `<p style="font-size:12px;color:var(--success);margin-top:8px">✓ Consumos de receta registrados automáticamente.</p>`;

      openModal('¿Hubo mermas o desperdicios?',
        `<div style="text-align:center;padding:20px 0">
          <img src="/static/img/PIXIE.png" style="width:90px;border-radius:10px;margin-bottom:16px;opacity:.8">
          <p style="font-size:15px;margin-bottom:8px">Pedido <strong style="color:var(--cyan)">${p.numero}</strong> marcado como entregado.</p>
          <p style="font-size:13px;color:var(--muted)">¿Hubo papel mal impreso, tinta desperdiciada u otra merma adicional?</p>
          ${yaRegistrado}
        </div>`,
        `<button class="btn-secondary" onclick="closeModal();renderPedidos()">No, todo OK</button>
         <button class="btn-primary" onclick="closeModal();modalRegistrarMerma('${p.numero}')">Sí, registrar merma</button>`
      );
    }, 300);

  } else {
    toast('Estado actualizado ✓');
    renderPedidos();
  }
}

async function saveMermas(numeroPedido) {
  const notas = document.getElementById('merma-notas')?.value || '';
  const items = [...document.querySelectorAll('.merma-item')];
  let saved = 0;
  for (const item of items) {
    const insumo_id = item.querySelector('.mi-insumo')?.value;
    const tipo = item.querySelector('.mi-tipo')?.value || 'MERMA';
    const cant = parseFloat(item.querySelector('.mi-cant')?.value || 0);
    if (!insumo_id || cant <= 0) continue;
    await api('/api/consumos', 'POST', {
      fecha: today(), tipo,
      descripcion: `Merma — Pedido ${numeroPedido}`,
      pedido_ref: numeroPedido,
      insumo_id, cantidad_base: 0, cantidad_real: cant, notas,
    });
    saved++;
  }
  toast(saved > 0 ? `${saved} merma(s) registradas ✓` : 'Sin cambios');
  closeModal(); renderPedidos();
}

function actualizarGraficoCat() {
  const year = document.getElementById('gas-year')?.value || '';
  const mes  = document.getElementById('gas-mes')?.value  || '';

  const filtered = _gastosData.filter(g => {
    if (!g.fecha) return false;
    if (year && !g.fecha.startsWith(year)) return false;
    if (mes && g.fecha.slice(5,7) !== mes) return false;
    return true;
  });

  const porCat = {};
  filtered.forEach(g => porCat[g.categoria] = (porCat[g.categoria]||0) + g.monto);
  const total = Object.values(porCat).reduce((a,b)=>a+b,0);
  const entries = Object.entries(porCat).sort((a,b)=>b[1]-a[1]);
  const maxV = Math.max(...entries.map(e=>e[1]),1);

  const CCOLORS = ['var(--cyan)','var(--magenta)','var(--lime)','var(--orange)',
                   'var(--success)','var(--warn)','#AA80FF','#FF8060','#60D4FF','#FFD060'];

  // Bar chart
  const barsHTML = entries.map(([cat,v],i) => {
    const pct = Math.round((v/maxV)*100);
    return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <div style="font-size:11px;color:var(--muted);width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:right;flex-shrink:0">${cat}</div>
      <div style="flex:1;height:20px;background:var(--bg3);border-radius:3px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:${CCOLORS[i%CCOLORS.length]};border-radius:3px;transition:width .4s"></div>
      </div>
      <div style="font-size:11px;font-weight:700;color:${CCOLORS[i%CCOLORS.length]};min-width:80px;text-align:right">${fmt(v)}</div>
    </div>`;
  }).join('');

  const chartWrap = document.getElementById('gas-chart-wrap');
  if (chartWrap) chartWrap.innerHTML = entries.length
    ? `<div style="font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px">Distribución por categoría</div>${barsHTML}`
    : `<div style="color:var(--muted);font-size:12px;text-align:center;padding:20px">Sin gastos en el período</div>`;

  // Tabla resumen
  const tablaHTML = entries.map(([cat,v],i) => `
    <div style="display:flex;justify-content:space-between;align-items:center;
                padding:7px 0;border-bottom:1px solid var(--border);font-size:12px">
      <div style="display:flex;align-items:center;gap:6px">
        <span style="width:8px;height:8px;border-radius:50%;background:${CCOLORS[i%CCOLORS.length]};display:inline-block"></span>
        <span style="color:var(--muted)">${cat}</span>
      </div>
      <strong>${fmt(v)}</strong>
    </div>`).join('');

  const catTabla = document.getElementById('gas-cat-tabla');
  if (catTabla) catTabla.innerHTML = entries.length ? `
    ${tablaHTML}
    <div style="display:flex;justify-content:space-between;padding:10px 0 0;font-weight:800;font-size:14px">
      <span>Total</span><span style="color:var(--danger)">${fmt(total)}</span>
    </div>` : '';
}

      <div class="form-group">
        <div class="form-label">Monto total del préstamo (₲)</div>
        <input id="pr-total" type="number" oninput="calcCuotaAuto()">
      </div>
      <div class="form-group">
        <div class="form-label">Monto adjudicado / recibido (₲)</div>
        <input id="pr-adj" type="number">
      </div>
      <div class="form-group">
        <div class="form-label">Cantidad de cuotas</div>
        <input id="pr-cuotas" type="number" value="12" oninput="calcCuotaAuto()">
      </div>
      <div class="form-group">
        <div class="form-label">Plazo en meses</div>
        <input id="pr-plazo" type="number" value="12">
      </div>
      <div class="form-group">
        <div class="form-label">Cuota mensual (₲)</div>
        <input id="pr-cuota" type="number" placeholder="Se calcula automático">
        <div style="font-size:11px;color:var(--muted);margin-top:3px">Podés editar si incluye intereses</div>
      </div>
      <div class="form-group">
        <div class="form-label">Fecha de inicio</div>
        <input id="pr-ini" type="date" value="${today()}">
      </div>
      <div class="form-group">
        <div class="form-label">Fecha de fin estimada</div>
        <input id="pr-fin" type="date">
      </div>
      <div class="form-group" style="grid-column:1/-1">
        <div class="form-label">Notas</div>
        <input id="pr-notas" placeholder="Tasa, condiciones, garantía...">
      </div>
    </div>`,
    `<button class="btn-secondary" onclick="closeModal()">Cancelar</button>
     <button class="btn-primary" onclick="savePrestamo()">Guardar</button>`
  );
}

function calcCuotaAuto() {
  const total = parseFloat(document.getElementById('pr-total')?.value || 0);
  const cuotas = parseInt(document.getElementById('pr-cuotas')?.value || 1);
  const cuotaInput = document.getElementById('pr-cuota');
  if (cuotaInput && total > 0 && cuotas > 0) {
    cuotaInput.value = Math.round(total / cuotas);
  }
}

async function savePrestamo() {
  await api('/api/prestamos', 'POST', {
    descripcion:     document.getElementById('pr-desc').value,
    entidad:         document.getElementById('pr-entidad').value,
    monto_total:     document.getElementById('pr-total').value,
    monto_adjudicado:document.getElementById('pr-adj').value || document.getElementById('pr-total').value,
    cuotas:          document.getElementById('pr-cuotas').value,
    plazo_meses:     document.getElementById('pr-plazo').value,
    cuota_mensual:   document.getElementById('pr-cuota').value,
    fecha_inicio:    document.getElementById('pr-ini').value,
    fecha_fin:       document.getElementById('pr-fin').value,
    notas:           document.getElementById('pr-notas').value,
  });
  toast('Préstamo guardado ✓'); closeModal(); renderEquipos();
}

async function delPrestamo(id) {
  if (!confirm('¿Eliminar este préstamo?')) return;
  await api(`/api/prestamos/${id}`, 'DELETE');
  toast('Eliminado'); renderEquipos();
}

async function modalNuevoEquipo() {
  openModal('Nuevo equipo', `
    <div class="form-grid cols2">
      <div class="form-group" style="grid-column:1/-1"><div class="form-label">Nombre del equipo</div>
        <input id="eq-nombre" placeholder="Impresora DTF, Prensa de calor..."></div>
      <div class="form-group"><div class="form-label">Fecha de compra</div>
        <input id="eq-fecha" type="date"></div>
      <div class="form-group"><div class="form-label">Costo total (₲)</div>
        <input id="eq-costo" type="number"></div>
      <div class="form-group"><div class="form-label">Vida útil (meses)</div>
        <input id="eq-vida" type="number" value="48"></div>
      <div class="form-group"><div class="form-label">Valor residual (₲)</div>
        <input id="eq-resid" type="number" value="0"></div>
    </div>`,
    `<button class="btn-secondary" onclick="closeModal()">Cancelar</button>
     <button class="btn-primary" onclick="saveEquipo()">Guardar</button>`
  );
}

async function saveEquipo() {
  await api('/api/equipos', 'POST', {
    nombre: document.getElementById('eq-nombre').value,
    fecha_compra: document.getElementById('eq-fecha').value,
    costo_total: document.getElementById('eq-costo').value,
    vida_util_meses: document.getElementById('eq-vida').value,
    valor_residual: document.getElementById('eq-resid').value,
  });
  toast('Equipo guardado ✓'); closeModal(); renderEquipos();
}

// ── PARÁMETROS ────────────────────────────────────────────────────
async function renderParametros() {
  const [p, cats] = await Promise.all([api('/api/parametros'), api('/api/categorias')]);
  document.getElementById('content').innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;max-width:900px">
      <div class="card">
        <div class="section-title">⚙️ Parámetros del negocio</div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:20px">
          Afectan el cálculo de costos y precios mínimos de todos los productos.
        </div>
        <div class="form-grid">
          <div class="form-group"><div class="form-label">Horas de trabajo por mes</div>
            <input id="p-horas" type="number" value="${p.horas_mes||160}"></div>
          <div class="form-group"><div class="form-label">Sueldo mensual deseado (₲)</div>
            <input id="p-sueldo" type="number" value="${p.sueldo_mensual||3500000}"></div>
          <div class="form-group"><div class="form-label">Gastos fijos mensuales (₲)</div>
            <input id="p-gfijos" type="number" value="${p.gastos_fijos||800000}"></div>
          <div class="form-group"><div class="form-label">Ventas estimadas por mes (uds)</div>
            <input id="p-ventas" type="number" value="${p.ventas_estimadas_mes||80}"></div>
          <div class="form-group"><div class="form-label">Margen de ganancia deseado</div>
            <input id="p-margen" type="number" step="0.01" max="0.99" value="${p.margen_deseado||0.35}">
            <div style="font-size:11px;color:var(--muted);margin-top:4px">Ej: 0.35 = 35%</div></div>
          <div class="form-group"><div class="form-label">IVA / Impuestos</div>
            <input id="p-imp" type="number" step="0.01" value="${p.impuestos||0.10}">
            <div style="font-size:11px;color:var(--muted);margin-top:4px">Ej: 0.10 = 10%</div></div>
        </div>
        <div class="divider"></div>
        <button class="btn-primary" onclick="saveParametros()">Guardar parámetros</button>
      </div>

      <div class="card">
        <div class="section-title">🏷️ Categorías</div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:16px">
          Categorías disponibles para insumos y productos.
        </div>
        <div id="cat-list">
          ${cats.map(c => `
            <div style="display:flex;align-items:center;justify-content:space-between;
                        padding:8px 12px;background:var(--bg3);border-radius:6px;margin-bottom:6px">
              <span style="font-size:13px">${c}</span>
            </div>`).join('')}
        </div>
        <div class="divider"></div>
        <div style="display:flex;gap:8px">
          <input id="nueva-cat" placeholder="Nueva categoría..." style="flex:1">
          <button class="btn-primary" onclick="addCategoria()">+ Agregar</button>
        </div>
      </div>
    </div>`;
}

async function addCategoria() {
  const val = document.getElementById('nueva-cat').value.trim();
  if (!val) return;
  await api('/api/categorias', 'POST', {valor: val});
  toast(`Categoría "${val}" agregada ✓`);
  renderParametros();
}

async function saveParametros() {
  await api('/api/parametros', 'PUT', {
    horas_mes: document.getElementById('p-horas').value,
    sueldo_mensual: document.getElementById('p-sueldo').value,
    gastos_fijos: document.getElementById('p-gfijos').value,
    ventas_estimadas_mes: document.getElementById('p-ventas').value,
    margen_deseado: document.getElementById('p-margen').value,
    impuestos: document.getElementById('p-imp').value,
  });
  toast('Parámetros guardados ✓');
}

// ── HELPERS UI ────────────────────────────────────────────────────
function filterTable(input, tableId) {
  const q = input.value.toLowerCase();
  const tipo = document.getElementById('fil-tipo')?.value.toLowerCase() || '';
  document.querySelectorAll(`#${tableId} tbody tr`).forEach(tr => {
    const text = tr.textContent.toLowerCase();
    const matchQ = !q || text.includes(q);
    const matchT = !tipo || text.includes(tipo);
    tr.style.display = (matchQ && matchT) ? '' : 'none';
  });
}

function switchTab(btn, tabId) {
  btn.closest('.tabs').querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const container = btn.closest('.tabs').nextElementSibling;
  let el = container;
  while (el) {
    if (el.classList?.contains('tab-content')) el.classList.remove('active');
    el = el.nextElementSibling;
  }
  document.getElementById(tabId)?.classList.add('active');
}

function emptyState(msg, sub='') {
  return `<tr><td colspan="20">
    <div class="empty-state">
      <img src="/static/img/PIXIE.png" alt="">
      <p>${msg}</p>
      <small>${sub}</small>
    </div>
  </td></tr>`;
}

function exportCSV() {
  const tablas = ['insumos','pedidos','gastos','consumos','marketing','equipos'];
  const menu = tablas.map(t =>
    `<button class="btn-secondary" style="width:100%;margin-bottom:8px;text-align:left"
      onclick="window.open('/api/export/${t}','_blank');closeModal()">
      ⬇ Exportar ${t}.csv
    </button>`).join('');
  openModal('Exportar datos', menu,
    `<button class="btn-secondary" onclick="closeModal()">Cerrar</button>`);
}

// ── INIT ──────────────────────────────────────────────────────────
navigate('dashboard');
</script>
